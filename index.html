<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개인 디지털 아카이브</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-[#0f2a4a] text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="flex justify-between items-center">
            <h1 class="text-lg font-bold tracking-tight">📱 통합 도서 검색</h1>
            <span id="dbStatus" class="text-xs bg-red-500 px-2 py-1 rounded-sm text-white font-medium">DB 미연결</span>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto space-y-4">

        <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-xs space-y-2">
            <label class="block text-xs font-bold text-gray-600">📂 SQLite DB 파일 로드</label>
            <input type="file" id="dbFileInput" accept=".db,.sqlite" 
                class="w-full text-xs text-gray-500 file:mr-3 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-teal-50 file:text-teal-700 hover:file:bg-teal-100">
        </div>

        <div class="relative">
            <input type="text" id="searchInput" placeholder="먼저 DB 파일을 선택해주세요..." disabled
                class="w-full p-3.5 bg-gray-100 border border-gray-300 rounded-xl text-sm pl-4 pr-10 focus:outline-hidden disabled:opacity-50 transition-all">
            <span class="absolute right-3 top-3.5 text-gray-400">🔍</span>
        </div>

        <div class="space-y-3">
            <div class="text-xs text-gray-500 font-medium px-1 flex justify-between">
                <span>검색 결과 (<span id="resultCount">0</span>건)</span>
                <span class="text-gray-400">ID순</span>
            </div>

            <div id="bookList" class="space-y-3">
                <div class="text-center py-12 text-gray-400 text-sm">상단의 SQLite DB 파일을 로드하면 데이터가 표시됩니다.</div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
